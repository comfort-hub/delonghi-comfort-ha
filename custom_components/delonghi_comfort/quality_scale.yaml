rules:
  # Bronze
  action-setup:
    status: exempt
    comment: The integration registers no custom actions.
  appropriate-polling: done
  brands:
    status: exempt
    comment: |
      Custom (HACS) integration; brand assets are not submitted to the
      home-assistant/brands repository.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: The integration registers no custom actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities read from the coordinator; none subscribe to events directly.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The integration registers no custom actions.
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: The integration has no options flow.
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Cloud integration; no local network discovery.
  discovery:
    status: exempt
    comment: Cloud integration; no local network discovery.
  docs-data-update: done
  docs-examples:
    status: exempt
    comment: The device is controlled through standard climate/switch entities.
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: One config entry maps to exactly one appliance.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: todo
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No user-actionable repair conditions beyond reauthentication.
  stale-devices:
    status: exempt
    comment: One config entry maps to exactly one appliance.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing: todo
