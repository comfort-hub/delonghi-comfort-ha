[mypy]
python_version = 3.13
platform = linux
# The integration package is `custom_components.delonghi_comfort`; without this mypy would
# treat it as top-level `delonghi_comfort` and shadow the library of the same name.
namespace_packages = true
explicit_package_bases = true
mypy_path = .
show_error_codes = true
follow_imports = normal
local_partial_types = true
strict_equality = true
strict_bytes = true
no_implicit_optional = true
warn_incomplete_stub = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
enable_error_code = deprecated, ignore-without-code, redundant-self, truthy-iterable
disable_error_code = annotation-unchecked, import-not-found, import-untyped
extra_checks = false
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
warn_return_any = true
warn_unreachable = true

# Tests deliberately re-check a config entry's state after transitions (LOADED -> NOT_LOADED).
# mypy narrows the enum on the first assert and then flags the later check as unreachable;
# these two codes are noise in that idiomatic pattern, so relax them for tests only.
[mypy-tests.*]
disable_error_code = comparison-overlap, unreachable
