[project]
name = "delonghi-comfort-ha"
description = "Home Assistant integration for De'Longhi 'My Comfort Hub' connected heaters"
readme = "README.md"
requires-python = ">=3.13.2"
license = "GPL-3.0-or-later"
# Bumped by release-please (release-please-config.json) in lockstep with
# custom_components/delonghi_comfort/manifest.json; do not edit by hand.
version = "0.2.0"
dependencies = [
    "homeassistant>=2025.9.0",
    "delonghi-comfort>=0.2.1",
]

[dependency-groups]
dev = [
    "codespell>=2.4.1",
    "homeassistant-stubs==2026.2.3",
    "mypy>=1.16.1",
    "pytest>=8.3.5",
    "pytest-homeassistant-custom-component>=0.13.0",
    "ruff>=0.12.0",
]

# This repo is a Home Assistant custom integration installed by copying
# custom_components/delonghi_comfort; it is never built or pip-installed, so tell
# uv not to treat it as a buildable package (it only provides the dev/test env).
# delonghi-comfort now resolves from PyPI (>=0.2.1) — no sibling-path source.
[tool.uv]
package = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
required-version = ">=0.11.0"
target-version = "py313"

[tool.ruff.lint.isort]
force-sort-within-sections = true
combine-as-imports = true
split-on-trailing-comma = false
known-first-party = ["homeassistant"]

[tool.ruff.lint]
select = [
    "A001",
    "ASYNC",
    "B",
    "BLE",
    "C",
    "COM818",
    "D",
    "DTZ003",
    "DTZ004",
    "E",
    "F",
    "FLY",
    "FURB",
    "G",
    "I",
    "INP",
    "ISC",
    "ICN001",
    "LOG",
    "N804",
    "N805",
    "N815",
    "PERF",
    "PGH",
    "PIE",
    "PL",
    "PT",
    "PTH",
    "PYI",
    "RET",
    "RSE",
    "RUF005",
    "RUF006",
    "RUF010",
    "RUF013",
    "RUF017",
    "RUF018",
    "RUF019",
    "SIM",
    "SLF",
    "SLOT",
    "T100",
    "TCH",
    "TID251",
    "TRY",
    "UP",
    "W",
]
ignore = [
    "D202",
    "D203",
    "D213",
    "E501",
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLR2004",
    "PLW2901",
    "TRY003",
    "W191",
    "E111",
    "E114",
    "E117",
    "D206",
    "D300",
    "Q",
    "COM812",
    "COM819",
    "ISC001",
]

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[tool.ruff.lint.mccabe]
max-complexity = 25

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["SLF001", "D100", "D101", "D102", "D103", "D104", "D105", "D107"]

[tool.mypy]
python_version = "3.13"
platform = "linux"
# The integration package is `custom_components.delonghi_comfort`; without this
# mypy would treat it as top-level `delonghi_comfort` and shadow the library of
# the same name.
namespace_packages = true
explicit_package_bases = true
mypy_path = "."
show_error_codes = true
follow_imports = "normal"
local_partial_types = true
strict_equality = true
strict_bytes = true
no_implicit_optional = true
warn_incomplete_stub = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
enable_error_code = [
    "deprecated",
    "ignore-without-code",
    "redundant-self",
    "truthy-iterable",
]
disable_error_code = ["annotation-unchecked", "import-not-found", "import-untyped"]
extra_checks = false
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
warn_return_any = true
warn_unreachable = true

# Tests deliberately re-check a config entry's state after transitions
# (LOADED -> NOT_LOADED). mypy narrows the enum on the first assert and then
# flags the later check as unreachable; relax those two codes for tests only.
[[tool.mypy.overrides]]
module = "tests.*"
disable_error_code = ["comparison-overlap", "unreachable"]

[tool.codespell]
quiet-level = 2
skip = "uv.lock,./.git/*,./.mypy_cache/*,*.json"
ignore-words-list = "hass"
